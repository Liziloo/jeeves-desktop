<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Jeeves</title>
    <meta http-equiv="Content-Security-Policy"
      content="
        default-src 'self'; 
        script-src 'self'; 
        style-src 'self' 'unsafe-inline'; 
        img-src 'self' data:; 
        connect-src http://localhost:3000;" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="app-shell">
      <aside id="sidebar">
        <div id="sidebar-header">Conversations</div>
        <div id="conversationList"></div>
      </aside>

      <main id="main">
        <div id="controls">
          <button id="newConversation">New Conversation</button>
          <button id="quickAsk">Quick Ask</button>
          <button id="renameConversation">Rename</button>
        </div>

        <div id="messages"></div>

        <input id="input" type="text" />
        <button id="send">Send</button>
      </main>
    </div>
    <dialog id="renameDialog">
      <form method="dialog">
        <label>
          New title:
          <input id="renameInput" type="text" />
        </label>
        <menu>
          <button value="cancel">Cancel</button>
          <button value="confirm">Rename</button>
        </menu>
      </form>
    </dialog>
    <dialog id="quickAskDialog">
      <form id="quickAsk" novalidate>
        <label>
          Task type:
          <select id="quickAskTaskType">
            <option value="general">General question</option>
            <option value="search">Search / lookup</option>
            <option value="summarize">Summarize pasted text</option>
            <option value="translate">Translate text</option>
            <option value="explain_code">Explain code</option>
            <option value="rewrite">Rewrite text</option>
            <option value="check_logic">Check logic</option>
          </select>
        </label>
        <label id="quickAskTargetLanguageWrapper" style="display: none;">
          Target language:
          <select id="quickAskTargetLanguage">
            <option value="English">English</option>
            <option value="Spanish">Spanish</option>
            <option value="French">French</option>
            <option value="German">German</option>
          </select>
        </label>
        <textarea id="quickAskInput" autofocus></textarea>
        <menu>
          <button value="cancel">Cancel</button>
          <button value="confirm">Ask</button>
        </menu>
      </form>
    </dialog>

    <script src="renderer.js"></script>
  </body>
</html>
